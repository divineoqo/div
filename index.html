<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>

<video id="vid" muted loop playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<script>
  const video = document.getElementById("vid");

  // force play after page loads
  window.addEventListener("load", async () => {
    try {
      await video.play();
    } catch (e) {
      console.log("Autoplay blocked:", e);
    }
  });

  // backup: start on first click
  document.body.addEventListener("click", () => {
    video.play();
  });
</script>

</body>
</html>
